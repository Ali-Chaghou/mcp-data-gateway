name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, test, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev dependencies
        run: make install

      - name: Lint (ruff check + format)
        run: make lint

      - name: Test (pytest)
        run: make test

      - name: Audit (bandit + pip-audit)
        run: make audit

  docs:
    name: Docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev dependencies
        run: make install

      # `make docs` runs `mkdocs build --strict`, so broken links or pages
      # missing from the nav fail the build. No database or secrets involved.
      - name: Build docs
        run: make docs

  integration:
    name: Live-DB integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentdata
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentdata"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_DB: agentdata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://gateway_reader:gateway_reader_dev_password@localhost:5432/agentdata
      MAX_ROWS: 200
      STATEMENT_TIMEOUT_MS: 5000
      LOG_LEVEL: INFO
      MCP_GATEWAY_RUN_INTEGRATION: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev dependencies
        run: make install

      - name: Load schema, sample data, and the gateway_reader role
        run: make load-data

      - name: Smoke test
        run: make smoke

      - name: Test suite (includes live-DB integration tests)
        run: make test

  image:
    name: Container image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mcp-data-gateway:ci .

      # Import-only sanity check. The entrypoint is overridden because running
      # the real entrypoint would start the stdio server and hang; no database
      # is needed since importing the package touches neither env nor DB.
      - name: Sanity check (import inside the image)
        run: docker run --rm --entrypoint python mcp-data-gateway:ci -c "import mcp_data_gateway.server; print('ok')"

      - name: Verify the image runs as non-root
        run: |
          test "$(docker run --rm --entrypoint id mcp-data-gateway:ci -un)" = "gateway"
