name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, test, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev dependencies
        run: make install

      - name: Lint (ruff check + format)
        run: make lint

      - name: Test (pytest)
        run: make test

      - name: Audit (bandit + pip-audit)
        run: make audit
