site_name: mcp-data-gateway
site_description: A read-only MCP gateway to PostgreSQL for AI agents
site_url: https://ali-chaghou.github.io/mcp-data-gateway/
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Security model: security-model.md
  - Tool reference: tool-reference.md
  - Operations: operations.md
  - Validation: validation.md
  - Production considerations: production-considerations.md
  - Implementation journey: implementation-journey.md
  - Demo walkthrough: demo-walkthrough.md
  - Decisions:
      - Overview: decisions.md
      - ADR-0001 · PostgreSQL: decision-records/0001-use-postgresql.md
      - ADR-0002 · Read-only access: decision-records/0002-read-only-agent-access.md
      - ADR-0003 · stdio-first: decision-records/0003-stdio-first.md
  - Project:
      - Plan: project-plan.md
      - Engineering process: engineering-process.md
