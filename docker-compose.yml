services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentdata}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Local development only — set a real secret in .env for anything else.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-agentdata}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
